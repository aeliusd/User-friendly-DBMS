<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>User-Friendly DBMS</title>
    <style>
        /* Simple structure rules to keep things organized */
        body { display: flex; font-family: sans-serif; margin: 0; height: 100vh; }
        #sidebar { width: 250px; background: #2c3e50; color: white; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        #sidebar h3 { margin-top: 0; border-bottom: 1px solid #34495e; padding-bottom: 10px; }
        .db-btn { background: #34495e; color: white; border: none; padding: 10px; text-align: left; cursor: pointer; border-radius: 4px; width: 100%; }
        .db-btn:hover { background: #1abc9c; }
        .db-btn.active { background: #1abc9c; font-weight: bold; }
        #upload-section { margin-top: auto; border-top: 1px solid #34495e; padding-top: 15px; }
        #main-content { flex: 1; padding: 20px; background: #ecf0f1; overflow-y: auto; }
        .hidden { display: none; }
    </style>
    <link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16x16.png">
    <link rel="manifest" href="icons/site.webmanifest">
    <link rel="icon" href="icons/favicon.ico" type="image/x-icon">
</head>
<body>

    <div id="sidebar">
        <h3>Databases</h3>
        <div id="database-list">
            <button class="db-btn active" onclick="selectDatabase('Northwind', this)">Northwind</button>
        </div>

        <div id="upload-section">
            <h4>Import New Data</h4>
            <input type="file" id="csvFile" accept=".csv" style="width: 100%; margin-bottom: 10px; color: white;" />
            <button onclick="handleCSVUpload()" style="width: 100%; background: #e67e22; color: white; border: none; padding: 8px; cursor: pointer; border-radius: 4px;">Upload .CSV</button>
        </div>
    </div>

    <div id="main-content">
        <div id="dashboard-view">
            <h2>Welcome to your DBMS Dashboard</h2>
            <p>Select a database from the left sidebar to begin browsing, or upload a new CSV spreadsheet to dynamically generate a new working database workspace.</p>
        </div>

        <div id="data-view" class="hidden">
            <h2 id="current-db-title">Northwind Workspace</h2>
            
            <div id="control-panel" style="margin-bottom: 20px;">
                <select id="tableSelect" onchange="if(this.value) loadTableData(this.value)" style="padding: 6px; margin-right: 15px;"></select>
                <button onclick="exportToCSV('filtered')" style="padding: 5px 15px; cursor: pointer; background-color: #007bff; color: white; border: none; border-radius: 4px; margin-right: 10px;">
                    ⬇️ Export Current View to CSV
                </button>
                <button onclick="exportToCSV('full')" style="padding: 5px 15px; cursor: pointer; background-color: #6c757d; color: white; border: none; border-radius: 4px;">
                    ⬇️ Export Entire Table to CSV
                </button>
                <br>
                <input type="text" id="search-box" placeholder="Search data..." style="padding: 5px;">
                <select id="column-dropdown" style="padding: 5px;">
                    <option value="ALL">All Columns</option>
                </select>
                <label style="margin: 0 10px;">
                    <input type="checkbox" id="exact-match-checkbox"> Exact Match
                </label>
                <button onclick="executeSearch()" style="padding: 5px 15px; cursor: pointer;">Search</button>
                <button onclick="clearSearch()" style="padding: 5px 15px; cursor: pointer;">Clear</button>
            </div>

            <div id="data-container">
                <p style="color: gray;">Select a table from the dropdown above to view data.</p>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
