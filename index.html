<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Access</title>
</head>
<body>
    <h1>My Database Tables, NorthWind</h1>
    <ul id="table-list">
        <li>Loading tables...</li>
    </ul>

    <div id = "control-panel" style= "margin-bottom: 15px; display: none;">
        <select id="column-dropdown" style="padding: 8px; border-radius: 4px; border: 1px solid #ccc;">
            <option value="ALL">All Columns</option>
        </select>
        
        <input type="text" id="search-box" placeholder="Search table..." style = "padding: 5px; width: 250px;">

        <label style="margin-left: 10px; margin-right: 10px; cursor: pointer;">
            <input type="checkbox" id="exact-match-checkbox"> Exact Match
        </label>

        <button onclick = "executeSearch()" style = "padding: 5px;">Search Table</button>
        <button onclick = "clearSearch()" style = "padding: 5px;">Clear Search</button>
    </div>

    <hr> <div id = "data-container"> 
        <p> Select a table to view its data </p>
    </div>


    <script src="app.js">  </script>
    
</body></html>
